<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OLO — Workstation (BLOCK_1)</title>
<style>
  body {
    margin: 0;
    background: #121212;
    color: #ccc;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" width="340" height="340" viewBox="0 0 340 340">

  <!--
    Scale: 1 cm = 0.5 px
    DESK_W = 80 cm = 40 px    (EW axis)
    DESK_D = 180 cm = 90 px   (NS axis)
    CHR = 70 cm = 35 px       (fixed zone)

    Layout EW (x): CHR(35) | DESK(40) = 75 px
    Layout NS (y): DESK(90) = 90 px

    Drawing origin: x0=100, y0=100

    Chair: 50% under desk
      Desk x=135, chair slides under desk
      Seat centered at x=125 (half under desk at x=135)
  -->

  <!-- Background -->
  <rect width="340" height="340" fill="#1e1e1e"/>

  <!-- Compass rose -->
  <text x="14" y="22" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">N</text>
  <line x1="18" y1="26" x2="18" y2="44" stroke="#fff" stroke-width="1.5"/>

  <!-- ============================================================ -->
  <!-- FIXED ZONE (chair clearance) — medium blue                   -->
  <!-- ============================================================ -->

  <rect x="100" y="100" width="35" height="90"
        fill="#3b7dc9" fill-opacity="0.40"
        stroke="#4a90d9" stroke-width="0.5"/>

  <!-- ============================================================ -->
  <!-- CHAIR — 50% under desk                                       -->
  <!-- ============================================================ -->

  <!-- Seat (centered at x=121, half under desk at x=135) -->
  <rect x="121" y="130" width="28" height="30" fill="#8B6914" rx="5"/>
  <!-- Backrest (west side) -->
  <rect x="117" y="134" width="6" height="22" fill="#6a4e0e" rx="3"/>
  <!-- Armrests -->
  <rect x="124" y="128" width="22" height="5" fill="#7a5c10" rx="2"/>
  <rect x="124" y="157" width="22" height="5" fill="#7a5c10" rx="2"/>

  <!-- ============================================================ -->
  <!-- DESK (work surface) — on top of chair                        -->
  <!-- ============================================================ -->

  <rect x="135" y="100" width="40" height="90"
        fill="#d0d0d0" stroke="#888" stroke-width="1" rx="1"/>

  <!-- Screen (east side, desk edge) -->
  <rect x="169" y="123" width="5" height="44"
        fill="#1a1a1a" rx="1"/>

  <!-- Desk label -->
  <text x="153" y="149" text-anchor="middle" font-family="sans-serif"
        font-size="9" fill="#555">WS01</text>

  <!-- ============================================================ -->
  <!-- DIMENSIONS — plain numbers, offset outward                   -->
  <!-- ============================================================ -->

  <!-- Desk width (80 cm) — above desk -->
  <text x="155" y="93" text-anchor="middle" font-family="sans-serif"
        font-size="9" fill="#aaa">80</text>

  <!-- Desk depth (180 cm) — to the right of desk -->
  <text x="182" y="149" font-family="sans-serif"
        font-size="9" fill="#aaa">180</text>

  <!-- Fixed zone CHR (70 cm) — above fixed zone -->
  <text x="117" y="93" text-anchor="middle" font-family="sans-serif"
        font-size="9" fill="#aaa">70</text>

  <!-- ============================================================ -->
  <!-- LEGEND                                                       -->
  <!-- ============================================================ -->

  <rect x="40" y="230" width="14" height="11" fill="#d0d0d0" stroke="#888" stroke-width="0.5"/>
  <text x="60" y="240" font-family="sans-serif" font-size="10" fill="#ccc">Desk (80 × 180 cm)</text>

  <rect x="40" y="250" width="14" height="11" fill="#3b7dc9" fill-opacity="0.40" stroke="#4a90d9" stroke-width="0.5"/>
  <text x="60" y="260" font-family="sans-serif" font-size="10" fill="#ccc">Fixed zone — chair clearance (70 cm)</text>

  <!-- Title at bottom -->
  <text x="170" y="295" text-anchor="middle" font-family="sans-serif"
        font-size="10" fill="#888">BLOCK_1 — 1 desk, facing EAST</text>
  <text x="170" y="310" text-anchor="middle" font-family="sans-serif"
        font-size="9" fill="#666">Footprint: 150 × 180 cm (with fixed zone)</text>

</svg>

</body>
</html>
