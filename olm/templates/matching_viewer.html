<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matching viewer — OLO</title>
<style>
  :root {
    --bg:       #0e0e0d;
    --surface:  #161614;
    --surface2: #1e1e1c;
    --border:   #2a2826;
    --text:     #e4e0d8;
    --text-dim: #6e6a62;
    --text-mid: #a8a39a;
    --accent:   #c8a050;
    --accent2:  #5090c0;
    --ok:       #58c080;
    --warn:     #c8a050;
    --bad:      #c05858;
    --font-mono: monospace;
    --font-serif: Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 300;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  header h1 em { font-style: italic; color: var(--accent); }
  .header-info {
    color: var(--text-dim);
    font-size: 11px;
    margin-left: auto;
  }

  .main {
    display: grid;
    grid-template-columns: 240px 1fr;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* --- Left panel: candidate list --- */
  .left-col {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .left-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .left-header .count {
    color: var(--accent);
    font-size: 12px;
  }
  .nav-btns {
    display: flex;
    gap: 4px;
  }
  .nav-btns button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 2px 10px;
    cursor: pointer;
  }
  .nav-btns button:hover { border-color: var(--accent); }

  .candidate-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .candidate-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    cursor: pointer;
    border-left: 3px solid transparent;
    font-size: 11px;
  }
  .candidate-item:hover { background: var(--surface2); }
  .candidate-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .candidate-name { flex: 1; }
  .candidate-desks {
    color: var(--text-dim);
    font-size: 10px;
    margin: 0 8px;
  }
  .candidate-score {
    font-weight: bold;
    min-width: 28px;
    text-align: right;
  }
  .score-good { color: var(--ok); }
  .score-mid  { color: var(--warn); }
  .score-bad  { color: var(--bad); }

  /* --- Centre panel --- */
  .center-col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    padding: 8px 20px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.05em;
    border-bottom: 2px solid transparent;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Drawing area */
  .view-area {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: var(--surface);
  }
  .view-area svg {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  .view-area svg.panning { cursor: grabbing; }

  /* --- Progress bar (bottom) --- */
  .legend-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 4px 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--text-dim);
  }
  .legend-swatch {
    width: 12px;
    height: 8px;
    border-radius: 1px;
  }
  .legend-line {
    width: 12px;
    height: 0;
    border-radius: 0;
  }

  .pipeline-bar {
    display: flex;
    align-items: center;
    border-top: 1px solid var(--border);
    padding: 6px 12px;
    gap: 4px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .pipeline-step {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    font-size: 10px;
    color: var(--text-dim);
    border: 1px solid var(--border);
    white-space: nowrap;
    cursor: default;
  }
  .pipeline-step.done {
    color: var(--ok);
    border-color: #1e4020;
    background: #0e2010;
  }
  .pipeline-step.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--surface2);
  }
  .pipeline-step .step-num {
    font-weight: bold;
    min-width: 14px;
    text-align: center;
  }
  .pipeline-arrow {
    color: var(--text-dim);
    font-size: 10px;
    flex-shrink: 0;
  }

  /* Status bar */
  .status-bar {
    padding: 4px 12px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 10px;
    flex-shrink: 0;
    height: 24px;
  }

  /* Room drawing constants */
  .canvas-toolbar {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .canvas-toolbar label { color: var(--text-dim); font-size: 11px; display: flex; align-items: center; gap: 4px; }
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .btn:hover { border-color: var(--accent); }

  .room-wall { fill: none; stroke: #a8a39a; stroke-width: 2; }
  .room-window { fill: none; stroke: var(--accent2); stroke-width: 3; }
  .room-door-arc { fill: none; stroke: var(--text-dim); stroke-width: 1.5; stroke-dasharray: 6 3; }
  .room-door-leaf { fill: none; stroke: var(--text); stroke-width: 2; }
  .room-label { fill: var(--text-dim); font-size: 7; font-family: monospace; }
</style>
</head>
<body>

<header>
  <h1>Matching <em>viewer</em> — OLO</h1>
  <span class="header-info" id="roomInfo">Room: -</span>
</header>

<div class="main">

  <!-- LEFT PANEL -->
  <div class="left-col">
    <div class="left-header">
      <div class="nav-btns">
        <button id="btnPrev" title="Previous (arrow up)">&#9650;</button>
        <button id="btnNext" title="Next (arrow down)">&#9660;</button>
      </div>
      <span class="count" id="candidateCount">0 candidate(s)</span>
    </div>
    <div class="candidate-list" id="candidateList"></div>
  </div>

  <!-- CENTRE PANEL -->
  <div class="center-col">
    <div class="tabs">
      <div class="tab active" data-tab="matching">Matching</div>
      <div class="tab" data-tab="amenagement">Layout</div>
    </div>
    <div class="canvas-toolbar">
      <label><input type="checkbox" id="gridToggle" checked> Grid</label>
      <button id="btnZoomOut" class="btn" style="font-size:12px;padding:2px 8px;" title="Zoom out">&#8722;</button>
      <span id="zoomLevel" style="color:var(--text-dim);font-size:10px;min-width:36px;text-align:center;">100%</span>
      <button id="btnZoomIn" class="btn" style="font-size:12px;padding:2px 8px;" title="Zoom in">+</button>
      <button id="btnZoomFit" class="btn" style="font-size:11px;padding:2px 8px;" title="Fit all">&#8861;</button>
    </div>
    <div class="view-area">
      <svg id="viewSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="none">
        <text x="400" y="300" text-anchor="middle" fill="#6e6a62" font-size="12"
              font-family="monospace">Loading...</text>
      </svg>
    </div>
  </div>

</div>

<!-- LEGEND -->
<div class="legend-bar" id="legendBar"></div>

<!-- PROGRESS BAR -->
<div class="pipeline-bar" id="pipelineBar"></div>

<div class="status-bar" id="statusBar">Ready.</div>

<script src="/static/block_constants.js"></script>
<script src="/static/block_geometry.js"></script>
<script src="/static/block_svg.js"></script>
<script>
"use strict";

// ========== VISUAL CONSTANTS ==========
const SCALE = 0.8;  // px par cm
const MARGIN = 30;   // marge autour de la piece
const GRID_STEP_CM = 10;

const COLOR_ROOM_FILL    = "#141413";
const COLOR_ZONE_EXCL    = "rgba(192, 88, 88, 0.25)";
const COLOR_CIRCULATION  = "rgba(88, 192, 128, 0.15)";

const COLOR_CELL_WALL      = "#4a4644";
const COLOR_CELL_FOOTPRINT = "#2a1a0e";
const COLOR_CELL_DOOR      = "#1a6850";
const COLOR_CELL_CORRIDOR  = "#1a2018";

// Path colors — defined in pathSegmentColor()
// Pastel green >= 160cm, pastel amber >= 90cm, pastel red < 90cm

// ========== PIPELINE STEPS ==========
const PIPELINE_STEPS = [
  { id: "selection",    label: "Candidate selection" },
  { id: "circulation",  label: "Circulation" },
  { id: "residuelles",  label: "Residual zones" },
  { id: "ajustements",  label: "Adjustments" },
  { id: "finalisation", label: "Finalisation" },
];

let BLOCK_DEFS = {};

// ========== STATE ==========
let state = {
  room: null,
  candidates: [],
  selectedIndex: 0,
  activeTab: "matching",
  pipelineStep: 0,
  gridVisible: true,
  viewBox: { x: 0, y: 0, w: 800, h: 600 },
  zoom: 1.0,
  isPanning: false,
  panStart: { x: 0, y: 0 },
};

// ========== DYNAMIC LOADING ==========
async function loadCandidates() {
  const resp = await fetch("/api/match");
  if (!resp.ok) {
    throw new Error("HTTP error " + resp.status);
  }
  return await resp.json();
}

// ========== RENDERING ==========
function setStatus(msg) {
  document.getElementById("statusBar").textContent = msg;
}

function scoreClass(score) {
  if (score >= 80) return "score-good";
  if (score >= 70) return "score-mid";
  return "score-bad";
}

function renderCandidateList() {
  const list = document.getElementById("candidateList");
  list.innerHTML = "";
  state.candidates.forEach(function(c, i) {
    const div = document.createElement("div");
    div.className = "candidate-item" + (i === state.selectedIndex ? " active" : "");
    div.innerHTML =
      '<span class="candidate-name">' + c.label + '</span>' +
      '<span class="candidate-desks">' + (c.n_desks || c.desks || 0) + 'd</span>' +
      '<span class="candidate-score ' + scoreClass(c.score) + '">' +
      (c.score != null ? c.score : "-") + '</span>';
    div.addEventListener("click", function() { selectCandidate(i); });
    list.appendChild(div);
  });
  document.getElementById("candidateCount").textContent =
    state.candidates.length + " candidate(s)";
}

function renderPipeline() {
  const bar = document.getElementById("pipelineBar");
  bar.innerHTML = "";
  PIPELINE_STEPS.forEach(function(step, i) {
    if (i > 0) {
      const arrow = document.createElement("span");
      arrow.className = "pipeline-arrow";
      arrow.textContent = "\u25B6";
      bar.appendChild(arrow);
    }
    const div = document.createElement("div");
    div.className = "pipeline-step";
    if (i < state.pipelineStep) div.className += " done";
    else if (i === state.pipelineStep) div.className += " active";
    div.innerHTML = '<span class="step-num">' + (i + 1) + '</span> ' + step.label;
    bar.appendChild(div);
  });
}

function renderRoom(svg, room, ox, oy) {
  // Returns { bg: string, fg: string }
  // bg = background (low z, under blocks), fg = walls/windows/doors/labels (high z, above)
  const bg = [];
  const fg = [];
  const w = room.eo_cm * SCALE;
  const h = room.ns_cm * SCALE;

  // Room background (bg)
  bg.push('<rect x="' + ox + '" y="' + oy + '" width="' + w + '" height="' + h +
    '" fill="' + COLOR_ROOM_FILL + '"/>');

  // Walls (fg)
  fg.push('<rect x="' + ox + '" y="' + oy + '" width="' + w + '" height="' + h +
    '" class="room-wall"/>');

  // Windows (fg)
  (room.windows || []).forEach(function(win) {
    const pos = win.position_cm * SCALE;
    const ww = win.width_cm * SCALE;
    if (win.wall === "north") {
      fg.push('<line x1="' + (ox + pos) + '" y1="' + oy +
        '" x2="' + (ox + pos + ww) + '" y2="' + oy + '" class="room-window"/>');
    } else if (win.wall === "south") {
      fg.push('<line x1="' + (ox + pos) + '" y1="' + (oy + h) +
        '" x2="' + (ox + pos + ww) + '" y2="' + (oy + h) + '" class="room-window"/>');
    } else if (win.wall === "west") {
      fg.push('<line x1="' + ox + '" y1="' + (oy + pos) +
        '" x2="' + ox + '" y2="' + (oy + pos + ww) + '" class="room-window"/>');
    } else if (win.wall === "east") {
      fg.push('<line x1="' + (ox + w) + '" y1="' + (oy + pos) +
        '" x2="' + (ox + w) + '" y2="' + (oy + pos + ww) + '" class="room-window"/>');
    }
  });

  // Doors (fg)
  (room.doors || []).forEach(function(door) {
    const pos = door.position_cm * SCALE;
    const dw = door.width_cm * SCALE;
    if (door.wall === "south") {
      const dx = ox + pos;
      const dy = oy + h;
      fg.push('<line x1="' + dx + '" y1="' + dy +
        '" x2="' + (dx + dw) + '" y2="' + dy +
        '" stroke="' + COLOR_ROOM_FILL + '" stroke-width="3"/>');
      const hingeX = (door.swing === "right") ? dx : dx + dw;
      const freeX  = (door.swing === "right") ? dx + dw : dx;
      const sweepDir = (door.swing === "right") ? 0 : 1;
      // Sweep arc
      fg.push('<path d="M ' + freeX + ' ' + dy +
        ' A ' + dw + ' ' + dw + ' 0 0 ' + sweepDir + ' ' + hingeX + ' ' + (dy - dw) +
        '" class="room-door-arc"/>');
      // Leaf (door open at 90°, offset 2px inward for visibility)
      var leafOff = (door.swing === "right") ? 2 : -2;
      fg.push('<line x1="' + (hingeX + leafOff) + '" y1="' + dy +
        '" x2="' + (hingeX + leafOff) + '" y2="' + (dy - dw) + '" class="room-door-leaf"/>');
    } else if (door.wall === "north") {
      const dx = ox + pos;
      const dy = oy;
      fg.push('<line x1="' + dx + '" y1="' + dy +
        '" x2="' + (dx + dw) + '" y2="' + dy +
        '" stroke="' + COLOR_ROOM_FILL + '" stroke-width="3"/>');
      const hingeX = (door.swing === "right") ? dx : dx + dw;
      const freeX  = (door.swing === "right") ? dx + dw : dx;
      const sweepDir = (door.swing === "right") ? 1 : 0;
      // Sweep arc
      fg.push('<path d="M ' + freeX + ' ' + dy +
        ' A ' + dw + ' ' + dw + ' 0 0 ' + sweepDir + ' ' + hingeX + ' ' + (dy + dw) +
        '" class="room-door-arc"/>');
      // Leaf (door open at 90°, offset 2px inward for visibility)
      var leafOff = (door.swing === "right") ? 2 : -2;
      fg.push('<line x1="' + (hingeX + leafOff) + '" y1="' + dy +
        '" x2="' + (hingeX + leafOff) + '" y2="' + (dy + dw) + '" class="room-door-leaf"/>');
    }
  });

  // Dimensions (fg) — just above and left of the room
  fg.push('<text x="' + (ox + w / 2) + '" y="' + (oy - 8) +
    '" text-anchor="middle" class="room-label">' + room.eo_cm + ' cm</text>');
  fg.push('<text x="' + (ox - 8) + '" y="' + (oy + h / 2) +
    '" text-anchor="middle" class="room-label" transform="rotate(-90 ' +
    (ox - 8) + ' ' + (oy + h / 2) + ')">' + room.ns_cm + ' cm</text>');
  // North (fg) — left of room, at top
  var leftCol = ox - 140;
  fg.push('<text x="' + leftCol + '" y="' + (oy + 10) +
    '" fill="#6e6a62" font-size="10" font-weight="bold" font-family="monospace">N &#9650;</text>');

  return { bg: bg.join("\n"), fg: fg.join("\n") };
}

function renderBlocks(candidate, ox, oy) {
  const elements = [];  // { z, s } for final z-order sort

  // The matcher returns blocks with absolute positions (x_cm, y_cm)
  // in the room coordinate frame. We iterate directly over them.
  var blockList = candidate.blocks || [];

  blockList.forEach(function(b) {
      const orient = b.orientation || 0;
      const geom0 = getBlockGeom(b.type);
      const geom = getEffectiveGeom(b.type, orient);

      const bx = ox + (b.x_cm || 0) * SCALE;
      const by = oy + (b.y_cm || 0) * SCALE;
      const bw = geom.eo * SCALE;
      const bh = geom.ns * SCALE;

      // Fixed zones (chair clearance) — blue
      // Minimum circulation zones — anthracite
      const f = geom.faces || {};

      // Opaque background covering block + all zones (masks grid underneath)
      const wNSup0 = ((f.west && f.west.non_superposable_cm) || 0) + ((f.west && f.west.candidate_cm) || 0);
      const eNSup0 = ((f.east && f.east.non_superposable_cm) || 0) + ((f.east && f.east.candidate_cm) || 0);
      const nNSup0 = ((f.north && f.north.non_superposable_cm) || 0) + ((f.north && f.north.candidate_cm) || 0);
      const sNSup0 = ((f.south && f.south.non_superposable_cm) || 0) + ((f.south && f.south.candidate_cm) || 0);
      elements.push({ z: 0.5, s: '<rect x="' + (bx - wNSup0 * SCALE) + '" y="' + (by - nNSup0 * SCALE) +
        '" width="' + ((geom.eo + wNSup0 + eNSup0) * SCALE) + '" height="' + ((geom.ns + nNSup0 + sNSup0) * SCALE) +
        '" fill="#1e1e1e"/>' });

      const wNSup = ((f.west && f.west.non_superposable_cm) || 0) * SCALE;
      if (wNSup > 0) {
        elements.push({ z: 2, s: '<rect x="' + (bx - wNSup) + '" y="' + by +
          '" width="' + wNSup + '" height="' + bh + '" fill="' + COLOR_NSUP_FILL +
          '" fill-opacity="' + COLOR_NSUP_OPACITY + '" stroke="' + COLOR_CAND_STROKE + '" stroke-width="0.5"/>' });
        const wCand = ((f.west && f.west.candidate_cm) || 0) * SCALE;
        if (wCand > 0) {
          elements.push({ z: 1, s: '<rect x="' + (bx - wNSup - wCand) + '" y="' + by +
            '" width="' + wCand + '" height="' + bh + '" fill="' + COLOR_CAND_FILL +
            '" fill-opacity="' + COLOR_CAND_OPACITY + '" stroke="' + COLOR_CAND_STROKE + '" stroke-width="0.5"/>' });
        }
      }
      const eNSup = ((f.east && f.east.non_superposable_cm) || 0) * SCALE;
      if (eNSup > 0) {
        elements.push({ z: 2, s: '<rect x="' + (bx + bw) + '" y="' + by +
          '" width="' + eNSup + '" height="' + bh + '" fill="' + COLOR_NSUP_FILL +
          '" fill-opacity="' + COLOR_NSUP_OPACITY + '" stroke="' + COLOR_CAND_STROKE + '" stroke-width="0.5"/>' });
        const eCand = ((f.east && f.east.candidate_cm) || 0) * SCALE;
        if (eCand > 0) {
          elements.push({ z: 1, s: '<rect x="' + (bx + bw + eNSup) + '" y="' + by +
            '" width="' + eCand + '" height="' + bh + '" fill="' + COLOR_CAND_FILL +
            '" fill-opacity="' + COLOR_CAND_OPACITY + '" stroke="' + COLOR_CAND_STROKE + '" stroke-width="0.5"/>' });
        }
      }
      const nNSup = ((f.north && f.north.non_superposable_cm) || 0) * SCALE;
      if (nNSup > 0) {
        elements.push({ z: 2, s: '<rect x="' + bx + '" y="' + (by - nNSup) +
          '" width="' + bw + '" height="' + nNSup + '" fill="' + COLOR_NSUP_FILL +
          '" fill-opacity="' + COLOR_NSUP_OPACITY + '" stroke="' + COLOR_CAND_STROKE + '" stroke-width="0.5"/>' });
        const nCand = ((f.north && f.north.candidate_cm) || 0) * SCALE;
        if (nCand > 0) {
          elements.push({ z: 1, s: '<rect x="' + bx + '" y="' + (by - nNSup - nCand) +
            '" width="' + bw + '" height="' + nCand + '" fill="' + COLOR_CAND_FILL +
            '" fill-opacity="' + COLOR_CAND_OPACITY + '" stroke="' + COLOR_CAND_STROKE + '" stroke-width="0.5"/>' });
        }
      }
      const sNSup = ((f.south && f.south.non_superposable_cm) || 0) * SCALE;
      if (sNSup > 0) {
        elements.push({ z: 2, s: '<rect x="' + bx + '" y="' + (by + bh) +
          '" width="' + bw + '" height="' + sNSup + '" fill="' + COLOR_NSUP_FILL +
          '" fill-opacity="' + COLOR_NSUP_OPACITY + '" stroke="' + COLOR_CAND_STROKE + '" stroke-width="0.5"/>' });
        const sCand = ((f.south && f.south.candidate_cm) || 0) * SCALE;
        if (sCand > 0) {
          elements.push({ z: 1, s: '<rect x="' + bx + '" y="' + (by + bh + sNSup) +
            '" width="' + bw + '" height="' + sCand + '" fill="' + COLOR_CAND_FILL +
            '" fill-opacity="' + COLOR_CAND_OPACITY + '" stroke="' + COLOR_CAND_STROKE + '" stroke-width="0.5"/>' });
        }
      }

      // Desks via block_svg.js
      const rects0 = getDeskRects(b.type);
      const rects = transformDeskRects(rects0, geom0.eo, geom0.ns, orient);
      rects.forEach(function(d) {
        renderDesk(elements, bx, by, d, SCALE);
      });

      // Block border (dashed) — z=2
      elements.push({ z: 2, s:
        '<rect x="' + bx + '" y="' + by +
        '" width="' + bw + '" height="' + bh +
        '" fill="none" stroke="' + COLOR_BLOCK_BORDER +
        '" stroke-width="1.5" stroke-dasharray="6 3"/>'
      });

  });

  // Z-order sort and assembly
  elements.sort(function(a, b) { return a.z - b.z; });
  return elements.map(function(e) { return e.s; }).join("\n");
}

function renderGrid(candidate, ox, oy) {
  if (!candidate || !candidate.grid) { return ""; }
  var grid = candidate.grid;
  var cellCm = candidate.grid_cell_cm || 10;
  var cellPx = cellCm * SCALE;
  var s = "";
  for (var row = 0; row < grid.length; row++) {
    for (var col = 0; col < grid[row].length; col++) {
      var val = grid[row][col];
      var color;
      if (val === 1) { color = COLOR_CELL_WALL; }
      else if (val === 2) { color = COLOR_CELL_FOOTPRINT; }
      else if (val === 3) { color = COLOR_CELL_DOOR; }
      else if (val === 4) { color = COLOR_CELL_CORRIDOR; }
      else { continue; }
      s += '<rect x="' + (ox + col * cellPx).toFixed(1) +
        '" y="' + (oy + row * cellPx).toFixed(1) +
        '" width="' + cellPx.toFixed(1) +
        '" height="' + cellPx.toFixed(1) +
        '" fill="' + color + '" opacity="0.5"/>';
    }
  }
  return s;
}

function pathSegmentColor(width_cm) {
  if (width_cm >= 160) return "rgba(140, 210, 170, 0.6)";
  if (width_cm >= 90)  return "rgba(220, 200, 140, 0.6)";
  return "rgba(210, 140, 140, 0.6)";
}

function pathStrokeWidth(width_cm) {
  return Math.max(3, Math.min(14, width_cm / 12));
}

function renderPaths(candidate, ox, oy) {
  var deskPaths = candidate.desk_paths || [];
  if (!deskPaths.length) return "";
  var cellPx = (candidate.grid_cell_cm || 10) * SCALE;
  var parts = [];

  deskPaths.forEach(function(dp, deskIdx) {
    var path = dp.path || [];
    var widths = dp.widths_cm || [];
    var doorC = dp.door_center || null;
    var chairC = dp.chair_center || null;

    if (path.length < 2) return;

    // Build the visual point list: door_center + path + chair_center
    var points = [];
    var pointWidths = [];

    // Start point: door centre
    if (doorC) {
      points.push({ x: ox + (doorC[1]) * cellPx, y: oy + (doorC[0]) * cellPx });
      pointWidths.push(widths[0] || 90);
    }

    // Cell path points
    for (var i = 0; i < path.length; i++) {
      points.push({
        x: ox + (path[i][1] + 0.5) * cellPx,
        y: oy + (path[i][0] + 0.5) * cellPx
      });
      pointWidths.push(widths[i] || 90);
    }

    // End point: chair centre
    if (chairC) {
      points.push({ x: ox + (chairC[1]) * cellPx, y: oy + (chairC[0]) * cellPx });
      pointWidths.push(widths[widths.length - 1] || 90);
    }

    // Draw segment by segment with variable colour and width
    for (var j = 0; j < points.length - 1; j++) {
      var p0 = points[j];
      var p1 = points[j + 1];
      var w = pointWidths[j];
      var color = pathSegmentColor(w);
      var sw = pathStrokeWidth(w);

      parts.push(
        '<line x1="' + p0.x.toFixed(1) + '" y1="' + p0.y.toFixed(1) +
        '" x2="' + p1.x.toFixed(1) + '" y2="' + p1.y.toFixed(1) +
        '" stroke="' + color + '" stroke-width="' + sw.toFixed(1) +
        '" stroke-linecap="round"/>'
      );
    }

    // Arrow at end (pointing to chair)
    var pEnd = points[points.length - 1];
    var pBefore = points[points.length - 2];
    var dx = pEnd.x - pBefore.x;
    var dy = pEnd.y - pBefore.y;
    var dist = Math.sqrt(dx * dx + dy * dy) || 1;
    var ux = dx / dist;
    var uy = dy / dist;
    var arrowLen = cellPx * 1.5;
    var arrowW = cellPx * 0.8;
    var tipX = pEnd.x;
    var tipY = pEnd.y;
    var bx1 = tipX - ux * arrowLen - uy * arrowW;
    var by1 = tipY - uy * arrowLen + ux * arrowW;
    var bx2 = tipX - ux * arrowLen + uy * arrowW;
    var by2 = tipY - uy * arrowLen - ux * arrowW;
    var lastW = pointWidths[pointWidths.length - 1] || 90;
    parts.push(
      '<polygon points="' +
      tipX.toFixed(1) + ',' + tipY.toFixed(1) + ' ' +
      bx1.toFixed(1) + ',' + by1.toFixed(1) + ' ' +
      bx2.toFixed(1) + ',' + by2.toFixed(1) +
      '" fill="' + pathSegmentColor(lastW) + '"/>'
    );

    // Min-width label, offset to the right of the path midpoint
    var mid = Math.floor(points.length / 2);
    var labelX = points[mid].x + 12;
    var labelY = points[mid].y - 2;
    // Offset each desk to avoid overlap
    labelX += deskIdx * 6;
    parts.push(
      '<text x="' + labelX.toFixed(1) + '" y="' + labelY.toFixed(1) +
      '" fill="' + pathSegmentColor(dp.min_width_cm || 90) +
      '" font-size="7" font-family="monospace" font-weight="bold">' +
      Math.round(dp.min_width_cm) + 'cm</text>'
    );
  });

  return parts.join("\n");
}

function renderView() {
  const svg = document.getElementById("viewSvg");
  if (!state.room || state.candidates.length === 0) {
    svg.innerHTML = '<text x="400" y="300" text-anchor="middle" fill="#6e6a62" ' +
      'font-size="12" font-family="monospace">No candidates</text>';
    return;
  }

  const room = state.room;
  const candidate = state.candidates[state.selectedIndex];
  const ox = MARGIN;
  const oy = MARGIN + 20;
  const totalW = room.eo_cm * SCALE + MARGIN * 2;
  const totalH = room.ns_cm * SCALE + MARGIN * 2 + 20;

  const elements = [];

  // Grid: 10cm dots + 1m lines + graduated ruler (same as pattern_editor.html)
  if (state.gridVisible) {
    const stepPx = GRID_STEP_CM * SCALE;
    const meterPx = 100 * SCALE;
    const vb = state.viewBox;
    const gxStart = Math.floor(vb.x / stepPx) * stepPx;
    const gyStart = Math.floor(vb.y / stepPx) * stepPx;
    const gxEnd = vb.x + vb.w;
    const gyEnd = vb.y + vb.h;

    // 10cm dots
    for (let gx = gxStart; gx <= gxEnd; gx += stepPx) {
      for (let gy = gyStart; gy <= gyEnd; gy += stepPx) {
        elements.push({ z: 0, s: '<circle cx="' + gx.toFixed(1) + '" cy="' + gy.toFixed(1) +
          '" r="0.6" fill="' + COLOR_GRID + '"/>' });
      }
    }

    // 1m lines
    const mxStart = Math.floor(vb.x / meterPx) * meterPx;
    const myStart = Math.floor(vb.y / meterPx) * meterPx;
    for (let mx = mxStart; mx <= gxEnd; mx += meterPx) {
      elements.push({ z: 0.1, s: '<line x1="' + mx.toFixed(1) + '" y1="' + gyStart.toFixed(1) +
        '" x2="' + mx.toFixed(1) + '" y2="' + gyEnd.toFixed(1) +
        '" stroke="' + COLOR_GRID_METER + '" stroke-width="0.5"/>' });
    }
    for (let my = myStart; my <= gyEnd; my += meterPx) {
      elements.push({ z: 0.1, s: '<line x1="' + gxStart.toFixed(1) + '" y1="' + my.toFixed(1) +
        '" x2="' + gxEnd.toFixed(1) + '" y2="' + my.toFixed(1) +
        '" stroke="' + COLOR_GRID_METER + '" stroke-width="0.5"/>' });
    }

    // Graduated ruler
    const rulerY = vb.y + 6;
    const rulerX = vb.x + 2;
    for (let mx = mxStart; mx <= gxEnd; mx += meterPx) {
      const m = Math.round(mx / meterPx);
      elements.push({ z: 10, s: '<text x="' + mx.toFixed(1) + '" y="' + rulerY.toFixed(1) +
        '" text-anchor="middle" fill="' + COLOR_RULER + '" font-size="6" font-family="monospace">' +
        m + 'm</text>' });
    }
    for (let my = myStart; my <= gyEnd; my += meterPx) {
      const m = Math.round(my / meterPx);
      elements.push({ z: 10, s: '<text x="' + rulerX.toFixed(1) + '" y="' + (my + 2).toFixed(1) +
        '" fill="' + COLOR_RULER + '" font-size="6" font-family="monospace">' + m + 'm</text>' });
    }
  }

  // Room: background (z=1, under blocks) + walls/windows/doors (z=8, above blocks)
  var roomParts = renderRoom(svg, room, ox, oy);
  elements.push({ z: 1, s: roomParts.bg });
  elements.push({ z: 8, s: roomParts.fg });

  // Circulation grid (layout tab only, z=0.5, under blocks)
  if (state.activeTab === "amenagement") {
    elements.push({ z: 0.5, s: renderGrid(candidate, ox, oy) });
  }

  // Pattern blocks
  const blocksStr = renderBlocks(candidate, ox, oy);
  elements.push({ z: 1.5, s: blocksStr });

  // Circulation paths door → chair (layout tab, z=7, above blocks)
  if (state.activeTab === "amenagement") {
    var pathsStr = renderPaths(candidate, ox, oy);
    if (pathsStr) {
      elements.push({ z: 7, s: pathsStr });
    }
  }

  // Left column (z=9): north, pattern name, legend
  var leftCol = ox - 140;

  // Pattern name (below N, +30px gap)
  var titleY = oy + 40;
  elements.push({ z: 9, s:
    '<text x="' + leftCol + '" y="' + titleY +
    '" fill="var(--text)" font-size="8" font-family="monospace">' +
    (candidate.normalized_dsl || candidate.pattern_name || "") + '</text>' +
    '<text x="' + leftCol + '" y="' + (titleY + 12) +
    '" fill="var(--text-dim)" font-size="7" font-family="monospace">' +
    (candidate.n_desks || candidate.desks || 0) + ' desks</text>'
  });

  // Score info (layout tab only)
  if (state.activeTab === "amenagement") {
    var violations = candidate.circulation_violations || [];
    var violStr = violations.slice(0, 3).join(", ");
    var scoresSvg =
      '<text x="' + leftCol + '" y="' + (titleY + 28) +
      '" fill="var(--text-dim)" font-size="7" font-family="monospace">Grade: ' +
      (candidate.circulation_grade || "-") + '</text>' +
      '<text x="' + leftCol + '" y="' + (titleY + 40) +
      '" fill="var(--text-dim)" font-size="7" font-family="monospace">Connectivity: ' +
      (candidate.circulation_connectivity != null ? candidate.circulation_connectivity + "%" : "-") +
      '</text>' +
      '<text x="' + leftCol + '" y="' + (titleY + 52) +
      '" fill="var(--text-dim)" font-size="7" font-family="monospace">Max detour: ' +
      (candidate.circulation_worst_detour != null ? candidate.circulation_worst_detour : "-") +
      '</text>';
    if (violStr) {
      scoresSvg +=
        '<text x="' + leftCol + '" y="' + (titleY + 64) +
        '" fill="var(--bad)" font-size="6" font-family="monospace">' + violStr + '</text>';
    }
    // Path widths per desk
    var deskPaths = candidate.desk_paths || [];
    var pathY = titleY + (violStr ? 76 : 64);
    deskPaths.forEach(function(dp) {
      var label = dp.desk_id + ": ";
      var color = "var(--text-dim)";
      if (!dp.path || !dp.path.length) {
        label += "BLOCKED";
        color = "var(--bad)";
      } else {
        label += dp.min_width_cm + "cm";
        if (dp.min_width_cm >= 160) color = "var(--ok)";
        else if (dp.min_width_cm >= 90) color = "var(--warn)";
        else color = "var(--bad)";
      }
      scoresSvg +=
        '<text x="' + leftCol + '" y="' + pathY +
        '" fill="' + color + '" font-size="6" font-family="monospace">' + label + '</text>';
      pathY += 10;
    });
    elements.push({ z: 9, s: scoresSvg });
  }

  elements.sort(function(a, b) { return a.z - b.z; });
  svg.innerHTML = elements.map(function(e) { return e.s; }).join("\n");

  updateViewBox();
}

// ========== ZOOM / PAN ==========
function updateViewBox() {
  var svg = document.getElementById("viewSvg");
  var vb = state.viewBox;
  svg.setAttribute("viewBox", vb.x + " " + vb.y + " " + vb.w + " " + vb.h);
  document.getElementById("zoomLevel").textContent = Math.round(state.zoom * 100) + "%";
}

function zoomIn() {
  var vb = state.viewBox;
  var factor = 0.8;
  var newW = vb.w * factor;
  var newH = vb.h * factor;
  vb.x += (vb.w - newW) / 2;
  vb.y += (vb.h - newH) / 2;
  vb.w = newW;
  vb.h = newH;
  state.zoom /= factor;
  renderView();
}

function zoomOut() {
  var vb = state.viewBox;
  var factor = 1.25;
  var newW = vb.w * factor;
  var newH = vb.h * factor;
  vb.x += (vb.w - newW) / 2;
  vb.y += (vb.h - newH) / 2;
  vb.w = newW;
  vb.h = newH;
  state.zoom /= factor;
  renderView();
}

function zoomFit() {
  // Fit to room + 5% margin, centred in container
  if (state.room) {
    var roomW = state.room.eo_cm * SCALE;
    var roomH = state.room.ns_cm * SCALE;
    // Fit room in SVG container
    var svgEl = document.getElementById("viewSvg");
    var rect = svgEl.getBoundingClientRect();
    var containerW = rect.width || 800;
    var containerH = rect.height || 600;
    var containerRatio = containerW / containerH;

    // Room should occupy 90% of visible height
    // ViewBox height = roomH / 0.9
    var fitH = roomH / 0.65;
    var fitW = fitH * containerRatio;

    // Origin: room centred horizontally, pinned to top with small margin
    var pieceCx = MARGIN + roomW / 2;
    var pieceTop = MARGIN + 20;
    var marginTop = fitH * 0.05;  // 5% top margin
    state.viewBox = {
      x: pieceCx - fitW / 2,
      y: pieceTop - marginTop,
      w: fitW,
      h: fitH,
    };
    state.zoom = 1.0;
  } else {
    state.viewBox = { x: 0, y: 0, w: 800, h: 600 };
    state.zoom = 1.0;
  }
  renderView();
}

// ========== NAVIGATION ==========
function selectCandidate(index) {
  state.selectedIndex = Math.max(0, Math.min(index, state.candidates.length - 1));
  renderCandidateList();
  zoomFit();
  setStatus("Candidate " + (state.selectedIndex + 1) + "/" + state.candidates.length +
    " — " + state.candidates[state.selectedIndex].label);
}

function prevCandidate() { selectCandidate(state.selectedIndex - 1); }
function nextCandidate() { selectCandidate(state.selectedIndex + 1); }

function renderLegend() {
  var bar = document.getElementById("legendBar");
  var items = [
    { type: "line",  color: "#a8a39a", width: "2px",   dash: false, label: "Wall" },
    { type: "line",  color: "#5090c0", width: "3px",   dash: false, label: "Window" },
    { type: "line",  color: "#a8a39a", width: "1.5px", dash: true,  label: "Door" },
    { type: "rect",  color: COLOR_NSUP_FILL, opacity: 0.6, label: "Fixed zone (chair)" },
    { type: "rect",  color: COLOR_CAND_FILL, opacity: 1.0, label: "Min. circulation" },
    { type: "rect",  color: COLOR_DESK_FILL, opacity: 1.0, label: "Desk" },
  ];
  if (state.activeTab === "amenagement") {
    items.push({ type: "rect", color: COLOR_CELL_CORRIDOR, opacity: 0.5, label: "Circulation" });
    items.push({ type: "rect", color: COLOR_CELL_WALL,     opacity: 0.5, label: "Wall/Exclusion" });
    items.push({ type: "rect", color: COLOR_CELL_DOOR,     opacity: 0.5, label: "Door (grid)" });
    items.push({ type: "line", color: "rgba(120, 200, 150, 0.7)", width: "4px", dash: false, label: "Passage >= 160cm" });
    items.push({ type: "line", color: "rgba(210, 190, 120, 0.7)", width: "3px", dash: false, label: "Passage >= 90cm" });
    items.push({ type: "line", color: "rgba(200, 120, 120, 0.7)", width: "2px", dash: false, label: "Passage < 90cm" });
  }
  var html = "";
  items.forEach(function(item) {
    html += '<div class="legend-item">';
    if (item.type === "line") {
      var borderStyle = item.dash
        ? "border-top: " + item.width + " dashed " + item.color
        : "border-top: " + item.width + " solid " + item.color;
      html += '<div class="legend-line" style="' + borderStyle + '"></div>';
    } else {
      html += '<div class="legend-swatch" style="background:' + item.color +
        ';opacity:' + item.opacity + '"></div>';
    }
    html += '<span>' + item.label + '</span>';
    html += '</div>';
  });
  bar.innerHTML = html;
}

function setTab(tabId) {
  state.activeTab = tabId;
  document.querySelectorAll(".tab").forEach(function(t) {
    t.classList.toggle("active", t.dataset.tab === tabId);
  });
  renderView();
  renderLegend();
}

// ========== INIT ==========
async function init() {
  // Load block defs
  try {
    const resp = await fetch("/api/blocks");
    if (resp.ok) {
      const data = await resp.json();
      BLOCK_DEFS = data.blocks || {};
    }
  } catch (e) {
    setStatus("Server unavailable — mock data.");
  }

  // Load data from catalogue
  try {
    const loaded = await loadCandidates();
    state.room = loaded.room;
    state.candidates = loaded.candidates;
    state.pipelineStep = loaded.pipelineStep;
    if (state.candidates.length === 0) {
      setStatus("No patterns in catalogue.");
    }
  } catch (e) {
    setStatus("Error loading catalogue: " + e.message);
  }

  document.getElementById("roomInfo").textContent =
    "Room: " + state.room.eo_cm + " x " + state.room.ns_cm + " cm";

  renderCandidateList();
  renderPipeline();
  selectCandidate(0);
  renderLegend();

  // Navigation
  document.getElementById("btnPrev").addEventListener("click", prevCandidate);
  document.getElementById("btnNext").addEventListener("click", nextCandidate);

  // Tabs
  document.querySelectorAll(".tab").forEach(function(tab) {
    tab.addEventListener("click", function() { setTab(tab.dataset.tab); });
  });

  // Grid toggle
  document.getElementById("gridToggle").addEventListener("change", function(e) {
    state.gridVisible = e.target.checked;
    renderView();
  });

  // Keyboard
  document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
      e.preventDefault();
      prevCandidate();
    } else if (e.key === "ArrowDown" || e.key === "ArrowRight") {
      e.preventDefault();
      nextCandidate();
    }
  });

  // Zoom / Pan
  var svgEl = document.getElementById("viewSvg");

  svgEl.addEventListener("mousedown", function(e) {
    if (e.button !== 0) return;
    state.isPanning = true;
    state.panStart = { x: e.clientX, y: e.clientY };
    svgEl.classList.add("panning");
    e.preventDefault();
  });

  document.addEventListener("mousemove", function(e) {
    if (!state.isPanning) return;
    var dx = e.clientX - state.panStart.x;
    var dy = e.clientY - state.panStart.y;
    state.panStart = { x: e.clientX, y: e.clientY };
    var rect = svgEl.getBoundingClientRect();
    state.viewBox.x -= dx * (state.viewBox.w / rect.width);
    state.viewBox.y -= dy * (state.viewBox.h / rect.height);
    updateViewBox();
  });

  document.addEventListener("mouseup", function() {
    if (state.isPanning) {
      state.isPanning = false;
      svgEl.classList.remove("panning");
    }
  });

  document.getElementById("btnZoomIn").addEventListener("click", zoomIn);
  document.getElementById("btnZoomOut").addEventListener("click", zoomOut);
  document.getElementById("btnZoomFit").addEventListener("click", zoomFit);
}

document.addEventListener("DOMContentLoaded", init);
</script>
