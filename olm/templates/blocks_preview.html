<h1>Canonical blocks — top view (AFNOR)</h1>
<p class="sub">Scale: 1 cm = 0.5 px — Initial facing: EAST — Fixed zones: chair clearance 70 cm + passage per ES-03/ES-04</p>

<!--
  Constants (px, scale=0.5):
    dw=40 (80cm desk width EW)
    dd=90 (180cm desk depth NS)
    chr=35 (70cm chair clearance)
    pas30=15 (30cm passage ES-03)
    pas90=45 (90cm passage ES-04)

  Fixed zone = chair clearance (35px) | line | passage (variable)
  SIDE and FACE blocks: passage=90cm (45px) because passage behind seated person
  BLOCK_1: passage=30cm (15px) because single desk access
-->
