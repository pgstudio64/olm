<h1>Blocs canoniques — vue de dessus (AFNOR)</h1>
<p class="sub">Echelle : 1 cm = 0.5 px — Regard initial : EST — Zones fixes : debattement 70 cm + passage selon ES-03/ES-04</p>

<!--
  Constantes (px, scale=0.5) :
    dw=40 (80cm desk width EO)
    dd=90 (180cm desk depth NS)
    chr=35 (70cm debattement)
    pas30=15 (30cm passage ES-03)
    pas90=45 (90cm passage ES-04)

  Zone fixe = debattement (35px) | trait | passage (variable)
  Blocs COTE et FACE : passage=90cm (45px) car on passe derriere personne assise
  BLOCK_1 : passage=30cm (15px) car acces poste seul
-->
